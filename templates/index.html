<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartSupport Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        :root { --primary: #1565C0; --secondary: #2E7D32; --bg: #f0f2f5; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; align-items: center; justify-content: center; }
        
        /* --- HALANG AUTO-ZOOM IPHONE SAFARI --- */
        input[type="text"], select { font-size: 16px !important; }

        /* Login Screen Styles */
        .login-card { background: var(--white); padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 350px; max-width: 90%; }
        .login-card input, .login-card select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 12px; background: var(--secondary); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }

        /* Main Dashboard Responsive Layout */
        .dashboard { display: none; width: 95%; max-width: 1100px; height: 85vh; background: var(--white); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .main-wrapper { display: flex; height: 100%; width: 100%; }

        /* Sidebar Design */
        .sidebar { width: 280px; border-right: 1px solid #ddd; background: #f8f9fa; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 20px; background: var(--primary); color: white; font-weight: bold; }
        .user-list { flex-grow: 1; overflow-y: auto; }
        .user-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; transition: 0.2s; position: relative; }
        .user-item:hover { background: #e9ecef; }
        .user-item.active { background: #d1e7ff; border-left: 5px solid var(--primary); }
        .unread-dot { position: absolute; right: 15px; top: 18px; width: 10px; height: 10px; background: red; border-radius: 50%; display: none; }

        /* Chat Area Design */
        .chat-area { flex-grow: 1; display: flex; flex-direction: column; background: #fff; min-width: 0; }
        .chat-header { padding: 15px 20px; border-bottom: 1px solid #eee; background: #fff; display: flex; justify-content: space-between; align-items: center; font-weight: bold; gap: 10px; }
        .chat-box { flex-grow: 1; padding: 20px; overflow-y: auto; background: #f9f9f9; }
        .controls { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; align-items: center; }
        .controls input { flex-grow: 1; padding: 12px; border: 1px solid #ddd; border-radius: 6px; min-width: 0; }

        /* Action Buttons */
        button { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; }
        .btn-send { background: var(--primary); }
        .btn-voice { background: #FF9800; min-width: 65px; } 
        .btn-call { background: #4CAF50; }
        .btn-end { background: #f44336; }
        #backBtn { background: #555; display: none; padding: 8px 12px; font-size: 13px; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        
        /* Message Bubbles styling */
        .msg { margin-bottom: 12px; max-width: 85%; padding: 10px; border-radius: 8px; font-size: 14px; word-wrap: break-word; }
        .msg.sent { background: #e3f2fd; align-self: flex-end; margin-left: auto; }
        .msg.received { background: #fff; border: 1px solid #ddd; }
        .system { color: #888; font-size: 12px; text-align: center; display: block; margin: 10px 0; width: 100%; }
        audio { display: block; margin-top: 5px; height: 40px; max-width: 100%; outline: none; }

        /* ==========================================================================
           MEDIA QUERIES FOR MOBILE DEVICES (RESPONSIVE ENGINE)
           ========================================================================== */
        @media (max-width: 768px) {
            body { padding: 0; background: #fff; }
            .dashboard { width: 100%; height: 100vh; border-radius: 0; box-shadow: none; }
            
            /* Toggle behavior for agent workflow on tiny screens */
            .sidebar { width: 100%; display: flex; }
            .chat-area { width: 100%; display: none; }
            
            /* When view-chat state is active on dashboard wrapper */
            .dashboard.view-chat .sidebar { display: none; }
            .dashboard.view-chat .chat-area { display: flex; }
            
            /* Expose back tracking button for mobile agent workflow */
            .dashboard.view-chat #backBtn { display: inline-flex; }
            
            .msg { max-width: 90%; }
            .controls { padding: 10px; gap: 6px; }
            button { padding: 10px 12px; }
        }
    </style>
</head>
<body>

<div id="loginScreen" class="login-card">
    <h2>SmartSupport Pro 🌐</h2>
    <input type="text" id="usernameInput" placeholder="Enter Username">
    <select id="roleInput">
        <option value="customer">Customer</option>
        <option value="agent">Agent</option>
    </select>
    <button class="btn-login" onclick="performLogin()">Login</button>
</div>

<div id="dashboardScreen" class="dashboard">
    <div class="main-wrapper">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">Active Chats</div>
            <div class="user-list" id="userList"></div>
        </div>
